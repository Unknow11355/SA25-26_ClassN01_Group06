<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beta Cinemas - Khuyến Mãi</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/schedule.css">
    
    <link rel="stylesheet" href="css/promotion.css">
</head>
<body>

    <div class="top-bar">
        <div class="top-bar-container">
            <div id="user-display" class="user-display">
                <a href="/login">Đăng nhập</a>
                <span class="divider">/</span>
                <a href="/login?mode=register">Đăng ký</a>
            </div>

            <div class="lang-switch">
                <a href="#"><img src="https://upload.wikimedia.org/wikipedia/commons/2/21/Flag_of_Vietnam.svg" width="20"> VN</a>
                <a href="#"><img src="https://upload.wikimedia.org/wikipedia/commons/a/a4/Flag_of_the_United_States.svg" width="20"> EN</a>
            </div>
        </div>
    </div>

    <header class="main-header">
        <div class="header-container">
            <a href="/" class="logo">
                <img src="images/main.jpg" alt="Beta Cinemas" style="height: 40px;">
            </a>
            
            <nav class="nav-list">
                <a href="/schedule" class="active">LỊCH CHIẾU THEO RẠP </a>
                <a href="/">PHIM</a>
                <a href="/news">THÔNG BÁO VÀ ƯU ĐÃI</a>
                <a href="profile.html">TÀI KHOẢN</a>
            </nav>
        </div>
    </header>

    <div class="container" style="padding: 20px;">
        
        <div class="schedule-toolbar">
            <div id="date-tabs-list" style="display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px;">
                </div>
        </div>

        <div class="note-bar" style="margin: 20px 0;">
            <span style="border: 1px solid red; color: red; padding: 2px;">22:00</span> Suất chiếu muộn, có thể tính thêm phí
        </div>

        <div id="schedule-movie-list">
            <p>Đang tải dữ liệu...</p>
        </div>

    </div>

    <div id="booking-modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            
            <h4 style="color: #666;">XÁC NHẬN ĐẶT VÉ</h4>
            
            <h2 id="popup-movie-name" style="color: #e71a0f; margin: 10px 0;">...</h2>
            
            <div style="text-align: left; background: #f5f5f5; padding: 15px; border-radius: 5px; margin: 15px 0;">
                <p><strong>Rạp:</strong> Nova Hà Đông</p>
                <p><strong>Ngày:</strong> <span id="popup-date" style="color: blue; font-weight: bold;">...</span></p>
                <p><strong>Giờ:</strong> <span id="popup-time" style="color: blue; font-weight: bold;">...</span></p>
            </div>

            <button id="btn-confirm-booking" style="background: #e71a0f; color: white; border: none; padding: 12px 30px; font-size: 16px; border-radius: 4px; width: 100%;">
                ĐỒNG Ý
            </button>
        </div>
    </div>

    <script src="js/index.js"></script>
    <script src="js/schedule.js"></script>

</body>
</html>
